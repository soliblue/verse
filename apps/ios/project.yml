name: Morrow
options:
  bundleIdPrefix: soli
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: false
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
targets:
  Morrow:
    type: application
    platform: iOS
    sources:
      - path: src
        excludes:
          - Info.plist
    info:
      path: src/Info.plist
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        ENABLE_PREVIEWS: true
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Morrow
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.news
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        MARKETING_VERSION: 0.1.0
        PRODUCT_BUNDLE_IDENTIFIER: soli.Morrow
        PRODUCT_NAME: Morrow
        SWIFT_APPROACHABLE_CONCURRENCY: true
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
  MorrowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Morrow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: soli.MorrowTests
  MorrowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Morrow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: soli.MorrowUITests
schemes:
  Morrow:
    build:
      targets:
        Morrow: all
        MorrowTests: [test]
        MorrowUITests: [test]
    test:
      targets:
        - MorrowTests
        - MorrowUITests
    run:
      config: Debug
    archive:
      config: Release
