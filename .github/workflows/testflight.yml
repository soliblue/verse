name: Private TestFlight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verse-testflight
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and upload internally
    if: github.actor == github.repository_owner && github.triggering_actor == github.repository_owner
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app
          xcodebuild -version

      - name: Require release configuration
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          python3 - <<'PY'
          import os

          required = (
              "APP_STORE_CONNECT_API_KEY_ID",
              "APP_STORE_CONNECT_API_ISSUER_ID",
              "APP_STORE_CONNECT_API_KEY_CONTENT",
              "DISTRIBUTION_CERTIFICATE_BASE64",
              "DISTRIBUTION_CERTIFICATE_PASSWORD",
              "PROVISIONING_PROFILE_BASE64",
              "APPLE_TEAM_ID",
          )
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit("Missing release configuration: " + ", ".join(missing))
          PY

      - name: Install fastlane
        run: gem install fastlane --version 2.237.0 --no-document

      - name: Install signing identity
        env:
          DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
          DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/verse-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          printf '%s' "$DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/verse-distribution.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/verse-distribution.p12" \
            -P "$DISTRIBUTION_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          echo "VERSE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_SOURCE="$RUNNER_TEMP/verse.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/verse.mobileprovision.plist"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          printf '%s' "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_SOURCE"
          security cms -D -i "$PROFILE_SOURCE" > "$PROFILE_PLIST"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST")"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          cp "$PROFILE_SOURCE" "$PROFILE_PATH"
          echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "VERSE_PROFILE_PATH=$PROFILE_PATH" >> "$GITHUB_ENV"

      - name: Build and upload to internal TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: fastlane ios beta

      - name: Cleanup signing material
        if: always()
        run: |
          security list-keychains -d user -s login.keychain-db
          if [[ -n "${VERSE_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$VERSE_KEYCHAIN_PATH"
          fi
          rm -f \
            "$RUNNER_TEMP/verse-distribution.p12" \
            "$RUNNER_TEMP/verse.mobileprovision" \
            "$RUNNER_TEMP/verse.mobileprovision.plist" \
            "${VERSE_PROFILE_PATH:-$RUNNER_TEMP/missing.mobileprovision}"
